<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowplit - 계획대로 안 돼도 괜찮은 여행 앱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: white;
            max-width: 600px;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .tagline {
            font-size: 24px;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .feature {
            text-align: center;
        }
        .feature-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .feature-text {
            font-size: 14px;
            opacity: 0.9;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: white;
            color: #667eea;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .download-btn svg {
            width: 24px;
            height: 24px;
        }
        .footer {
            margin-top: 60px;
            opacity: 0.7;
            font-size: 14px;
        }
        .footer a {
            color: white;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flowplit</h1>
        <p class="tagline">계획대로 안 돼도 괜찮은 여행 앱</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">✈️</div>
                <div class="feature-text">유연한 여행 계획</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔄</div>
                <div class="feature-text">Plan B 대안</div>
            </div>
            <div class="feature">
                <div class="feature-icon">💰</div>
                <div class="feature-text">더치페이 정산</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🧳</div>
                <div class="feature-text">짐 챙기기</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🌤️</div>
                <div class="feature-text">날씨 정보</div>
            </div>
        </div>

        <a href="https://apps.apple.com/kr/app/flowplit/id6758321678" class="download-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            App Store에서 다운로드
        </a>

        <div class="footer">
            <p><a href="https://qkrtjddlf11.github.io/Flowplit-Docs/">Documentation</a></p>
            <p style="margin-top: 8px;">&copy; 2026 Flowplit. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
